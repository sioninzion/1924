<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>신나는 몽골어 번역기</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    padding: 20px;
}

h1 { margin-bottom: 20px; }

.container {
    max-width: 500px;
    margin: auto;
}

input {
    width: 70%;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px;
    background: #2d8cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}

.roman { color: green; }
.special { color: purple; font-weight: bold; }

.history {
    margin-top: 30px;
    text-align: left;
}

.item {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.copy-btn {
    background: #ddd;
    border: none;
    padding: 5px;
    cursor: pointer;
}

/* 📱 진행사항-1: 가로모드 */
@media (orientation: landscape) {
    body {
        transform: rotate(90deg);
        transform-origin: center;
    }
    .result {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<h1>🇲🇳 신나는 몽골어 번역기</h1>

<div class="container">

<input type="text" id="input" placeholder="한국어 입력">
<button onclick="run()">변환</button>

<div class="result" id="result"></div>
<div class="history" id="history"></div>

</div>

<script>

/* 📘 단어장 전체 */
const vocab = {
"안녕하세요":"센배노","안녕":"센배노",
"감사합니다":"바얄랄라~","감사해요":"바얄랄라~",
"사랑합니다":"하이르태",
"예수님":"예수쓰","예수":"예수쓰",
"하나님":"보르항",
"교회":"초글랑",
"기도":"잘브리흐",
"아멘":"아멘",
"맛있다":"암트태",
"예쁘다":"흐-르흥",

"오늘":"우너두르","내일":"마르가시","시간":"짜끄",
"음식":"호올","사랑":"하이르","사진":"조락",
"대학생":"오욧땅","회사원":"아질띤","선생님":"박싀",
"공부":"히첼","과자":"보오브","예":"티",
"맞습니다":"문","아니오":"우구이","아닙니다":"비시",
"갑시다":"여우야","오세요":"이레레",
"빨리빨리":"호르똥호르똥","좋습니다":"샌 밴",
"괜찮아요":"주-게래",

"1":"넥","2":"호요르","3":"고롭","4":"두릅",
"5":"탑","6":"조르가","7":"덜러","8":"나임","9":"유스","10":"아롱",

"빨간색":"올랑-옹고","파란색":"후흐 옹고","하늘색":"쳉헤르 옹고"
};

/* 🔥 유사 단어 찾기 */
function findSimilarWord(input) {
    input = input.replace(/\s/g, "");

    let bestMatch = "";
    let maxScore = 0;

    for (let key in vocab) {
        let score = 0;

        if (input.includes(key)) score += 2;
        if (key.includes(input)) score += 2;

        for (let i = 0; i < key.length; i++) {
            if (input.includes(key[i])) score += 0.5;
        }

        if (score > maxScore) {
            maxScore = score;
            bestMatch = key;
        }
    }

    return maxScore > 1 ? bestMatch : null;
}

/* 로마자 */
function toRoman(text) {
    return text
        .replace(/а/g,"a").replace(/б/g,"b").replace(/в/g,"v")
        .replace(/г/g,"g").replace(/д/g,"d").replace(/е/g,"e")
        .replace(/ё/g,"yo").replace(/ж/g,"j").replace(/з/g,"z")
        .replace(/и/g,"i").replace(/й/g,"i").replace(/к/g,"k")
        .replace(/л/g,"l").replace(/м/g,"m").replace(/н/g,"n")
        .replace(/о/g,"o").replace(/ө/g,"ö").replace(/п/g,"p")
        .replace(/р/g,"r").replace(/с/g,"s").replace(/т/g,"t")
        .replace(/у/g,"u").replace(/ү/g,"ü").replace(/ф/g,"f")
        .replace(/х/g,"kh").replace(/ц/g,"ts").replace(/ч/g,"ch")
        .replace(/ш/g,"sh").replace(/ы/g,"y").replace(/э/g,"e")
        .replace(/ю/g,"yu").replace(/я/g,"ya");
}

/* 한글독 */
function romanToKorean(text) {
    return text
        .replace(/sh/g,"쉬").replace(/ch/g,"치").replace(/kh/g,"흐")
        .replace(/ts/g,"츠").replace(/yo/g,"요").replace(/yu/g,"유")
        .replace(/ya/g,"야")
        .replace(/a/g,"아").replace(/e/g,"에").replace(/i/g,"이")
        .replace(/o/g,"오").replace(/u/g,"우").replace(/ö/g,"어")
        .replace(/ü/g,"위").replace(/y/g,"으")
        .replace(/b/g,"ㅂ").replace(/v/g,"ㅂ").replace(/g/g,"ㄱ")
        .replace(/d/g,"ㄷ").replace(/j/g,"ㅈ").replace(/z/g,"ㅈ")
        .replace(/k/g,"ㅋ").replace(/l/g,"ㄹ").replace(/m/g,"ㅁ")
        .replace(/n/g,"ㄴ").replace(/p/g,"ㅍ").replace(/r/g,"르")
        .replace(/s/g,"ㅅ").replace(/t/g,"ㅌ").replace(/f/g,"ㅍ");
}

let historyList = [];

async function run() {
    const input = document.getElementById("input").value;

    const res = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=mn&dt=t&q=" 
        + encodeURIComponent(input)
    );
    const data = await res.json();

    const mn = data[0][0][0];
    const roman = toRoman(mn);
    const kor = romanToKorean(roman);

    /* 📘 단어장 매칭 */
    let matched = vocab[input] ? input : findSimilarWord(input);
    let special = matched ? vocab[matched] : "";

    let html = `
        <div>${mn}</div>
        <div class="roman">${roman}</div>
    `;

    if (special) {
        html += `<div class="special">✝️ ${special}</div>`;
    }

    document.getElementById("result").innerHTML = html;

    /* 기록 */
    let text = `${input} / ${mn} / ${roman} / ${kor}`;
    if (special) text += ` / ${special}`;

    historyList.unshift(text);
    if (historyList.length > 12) historyList.pop();

    renderHistory();
}

/* 기록 출력 */
function renderHistory() {
    const box = document.getElementById("history");
    box.innerHTML = "";

    historyList.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        const span = document.createElement("span");
        span.innerText = item;

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.innerText = "복사";
        btn.onclick = () => navigator.clipboard.writeText(item);

        div.appendChild(span);
        div.appendChild(btn);
        box.appendChild(div);
    });
}

/* 🔥 진행사항-1: 엔터 */
document.getElementById("input").addEventListener("keydown", function(e){
    if(e.key === "Enter") run();
});
</script>

</body>
</html>
