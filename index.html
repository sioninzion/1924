<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신나는 몽골어 번역기</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    margin: 0;
    padding: 10px;
    text-align: center;
}

h1 { margin: 15px 0; }

.container {
    max-width: 600px;
    margin: auto;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
}

button.main {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    background: #2d8cff;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

.en {
    color: #00c853;
    margin-top: 5px;
}

.history {
    margin-top: 25px;
    text-align: left;
}

.item {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}

.buttons {
    margin-top: 8px;
    display: flex;
    gap: 5px;
}

.copy-btn, .screen-btn {
    flex: 1;
    border: none;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}

.copy-btn { background: #ddd; }
.screen-btn { background: #ffd54f; }

/* 🔥 스크린 모드 */
#screenMode {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: black;
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

#screenText {
    font-size: 40px;
    padding: 20px;
    word-break: break-word;
}

/* 🔥 가로 모드 스타일 */
.landscape #screenText {
    font-size: 60px;
}

/* 🔘 모드 버튼 */
.mode-buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.mode-buttons button {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.land-btn { background: #81c784; }
.port-btn { background: #64b5f6; }

#backBtn {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 18px;
    background: white;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>🇲🇳 신나는 몽골어 번역기</h1>

<div class="container">

<input type="text" id="koreanText" placeholder="한국어 입력">
<button class="main" onclick="run()">변환</button>

<div class="result" id="result"></div>
<div class="en" id="english"></div>

<div class="history" id="history"></div>

</div>

<!-- 🔥 스크린 모드 -->
<div id="screenMode">
    <div id="screenText"></div>

    <!-- 🔥 가로/세로 버튼 -->
    <div class="mode-buttons">
        <button class="land-btn" onclick="setLandscape()">가로 모드</button>
        <button class="port-btn" onclick="setPortrait()">세로 모드</button>
    </div>

    <button id="backBtn" onclick="closeScreen()">돌아가기</button>
</div>

<script>
let historyList = [];

// 로마자
function toRoman(text) {
    return text
        .replace(/а/g,"a").replace(/б/g,"b").replace(/в/g,"v")
        .replace(/г/g,"g").replace(/д/g,"d").replace(/е/g,"e")
        .replace(/ё/g,"yo").replace(/ж/g,"j").replace(/з/g,"z")
        .replace(/и/g,"i").replace(/й/g,"i").replace(/к/g,"k")
        .replace(/л/g,"l").replace(/м/g,"m").replace(/н/g,"n")
        .replace(/о/g,"o").replace(/ө/g,"ö").replace(/п/g,"p")
        .replace(/р/g,"r").replace(/с/g,"s").replace(/т/g,"t")
        .replace(/у/g,"u").replace(/ү/g,"ü").replace(/ф/g,"f")
        .replace(/х/g,"kh").replace(/ц/g,"ts").replace(/ч/g,"ch")
        .replace(/ш/g,"sh").replace(/ы/g,"y").replace(/э/g,"e")
        .replace(/ю/g,"yu").replace(/я/g,"ya");
}

// 한글독
function romanToKorean(text) {
    return text
        .replace(/sh/g,"쉬").replace(/ch/g,"치").replace(/kh/g,"흐")
        .replace(/ts/g,"츠").replace(/yo/g,"요").replace(/yu/g,"유")
        .replace(/ya/g,"야")
        .replace(/a/g,"아").replace(/e/g,"에").replace(/i/g,"이")
        .replace(/o/g,"오").replace(/u/g,"우").replace(/ö/g,"어")
        .replace(/ü/g,"위").replace(/y/g,"으")
        .replace(/b/g,"ㅂ").replace(/v/g,"ㅂ").replace(/g/g,"ㄱ")
        .replace(/d/g,"ㄷ").replace(/j/g,"ㅈ").replace(/z/g,"ㅈ")
        .replace(/k/g,"ㅋ").replace(/l/g,"ㄹ").replace(/m/g,"ㅁ")
        .replace(/n/g,"ㄴ").replace(/p/g,"ㅍ").replace(/r/g,"르")
        .replace(/s/g,"ㅅ").replace(/t/g,"ㅌ").replace(/f/g,"ㅍ");
}

async function run() {
    const text = document.getElementById("koreanText").value;

    const mnRes = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=mn&dt=t&q=" 
        + encodeURIComponent(text)
    );
    const mnData = await mnRes.json();
    const mongol = mnData[0][0][0];

    const enRes = await fetch(
        "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=en&dt=t&q=" 
        + encodeURIComponent(text)
    );
    const enData = await enRes.json();
    const english = enData[0][0][0];

    const roman = toRoman(mongol);
    const koreanRead = romanToKorean(roman);

    document.getElementById("result").innerText =
        mongol + " / " + roman + " / " + koreanRead;

    document.getElementById("english").innerText =
        "EN: " + english;

    historyList.unshift({ko:text, mn:mongol, ro:roman, kr:koreanRead});
    if (historyList.length > 12) historyList.pop();

    renderHistory();
}

// 스크린
function openScreen(text) {
    document.getElementById("screenText").innerText = text;
    document.getElementById("screenMode").style.display = "flex";
    document.body.classList.remove("landscape");
}

function closeScreen() {
    document.getElementById("screenMode").style.display = "none";
}

// 가로 / 세로 모드
function setLandscape() {
    document.body.classList.add("landscape");
}

function setPortrait() {
    document.body.classList.remove("landscape");
}

// 기록 렌더링
function renderHistory() {
    const container = document.getElementById("history");
    container.innerHTML = "";

    historyList.forEach((item) => {
        const div = document.createElement("div");
        div.className = "item";

        const textDiv = document.createElement("div");
        textDiv.innerText =
            `${item.ko} / ${item.mn} / ${item.ro} / ${item.kr}`;

        const btns = document.createElement("div");
        btns.className = "buttons";

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerText = "복사";
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(
                `${item.ko} / ${item.mn} / ${item.ro} / ${item.kr}`
            );
        };

        const screenBtn = document.createElement("button");
        screenBtn.className = "screen-btn";
        screenBtn.innerText = "스크린";
        screenBtn.onclick = () => openScreen(item.mn);

        btns.appendChild(copyBtn);
        btns.appendChild(screenBtn);

        div.appendChild(textDiv);
        div.appendChild(btns);

        container.appendChild(div);
    });
}
</script>

</body>
</html>
