.item-content {

.history-card {

.history-main {

.copy-btn {

.screen-btn {
    background: #444;

#screenMode {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
    transition: background 0.2s, color 0.2s;
}

#screenMode.inverted {
    background: #f8f8f8;
    color: #111;
}

#screenContent {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s;
    max-width: 90vw;
}

#screenText {

    font-weight: 700;

    text-align: center;
    line-height: 1.5;
    transition: color 0.2s;
}

#screenMode.inverted #screenSub {
    color: #666;
}

.screen-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    max-width: 760px;
    margin: 0 auto;

.screen-controls button {

.screen-btn-vertical {

}

.screen-btn-horizontal {

.screen-btn-minus {

.screen-btn-plus {

.screen-btn-invert {

.screen-btn-close {

function normalizeForMatch(text) {
    return String(text)
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/,/g, "")
        .replace(/[~!@#$%^&*()_\-+=|\\{}[\]:;"'<>,.?/]/g, "");
}

function isNumericLike(text) {
    return /^[0-9,]+$/.test(String(text).trim());
}

function findGlossaryMatches(input) {
    const normalizedInput = normalizeForMatch(input);
    if (!normalizedInput) return [];

    const matches = [];
    const seenPron = new Set();
    const sortedBook = [...glossaryBook].sort((a, b) => b[0].length - a[0].length);

    for (const [origin, pronunciation] of sortedBook) {
        const normalizedOrigin = normalizeForMatch(origin);
        if (!normalizedOrigin) continue;

        let matched = false;

        if (isNumericLike(origin)) {
            matched = normalizedInput === normalizedOrigin;
        } else {
            matched = normalizedInput.includes(normalizedOrigin);
        }

        if (matched && !seenPron.has(pronunciation)) {
            seenPron.add(pronunciation);
            matches.push({ origin, pronunciation });
        }
    }

    return matches;
}

function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightMatchedOrigins(input, matches) {
    let output = input;
    const sortedOrigins = [...matches]
        .map(item => item.origin)
        .sort((a, b) => b.length - a.length);

    for (const origin of sortedOrigins) {
        if (!origin) continue;
        const escaped = escapeRegExp(origin);
        const regex = new RegExp(escaped, "g");
        output = output.replace(regex, `<span class="highlight-word">${origin}</span>`);
    }
    return output;
}

function toRoman(text) {
    return text
        .replace(/щ/g, "sh")
        .replace(/ш/g, "sh")
        .replace(/ч/g, "ch")
        .replace(/ц/g, "ts")
        .replace(/ё/g, "yo")
        .replace(/ю/g, "yu")
        .replace(/я/g, "ya")
        .replace(/ж/g, "j")
        .replace(/х/g, "kh")
        .replace(/ү/g, "ü")
        .replace(/ө/g, "ö")
        .replace(/ы/g, "y")
        .replace(/э/g, "e")
        .replace(/й/g, "i")
        .replace(/а/g, "a")
        .replace(/б/g, "b")
        .replace(/в/g, "v")
        .replace(/г/g, "g")
        .replace(/д/g, "d")
        .replace(/е/g, "e")
        .replace(/з/g, "z")
        .replace(/и/g, "i")
        .replace(/к/g, "k")
        .replace(/л/g, "l")
        .replace(/м/g, "m")
        .replace(/н/g, "n")
        .replace(/о/g, "o")
        .replace(/п/g, "p")
        .replace(/р/g, "r")
        .replace(/с/g, "s")
        .replace(/т/g, "t")
        .replace(/у/g, "u")
        .replace(/ф/g, "f");
}

function romanToKorean(text) {
    return text
        .replace(/sh/g, "쉬")
        .replace(/ch/g, "치")
        .replace(/kh/g, "흐")
        .replace(/ts/g, "츠")
        .replace(/yo/g, "요")
        .replace(/yu/g, "유")
        .replace(/ya/g, "야")
        .replace(/ö/g, "어")
        .replace(/ü/g, "우")
        .replace(/y/g, "으")
        .replace(/j/g, "지")
        .replace(/z/g, "즈")
        .replace(/r/g, "르")
        .replace(/a/g, "아")
        .replace(/e/g, "에")
        .replace(/i/g, "이")
        .replace(/o/g, "오")
        .replace(/u/g, "우")
        .replace(/b/g, "ㅂ")
        .replace(/v/g, "ㅂ")
        .replace(/g/g, "ㄱ")
        .replace(/d/g, "ㄷ")
        .replace(/k/g, "ㅋ")
        .replace(/l/g, "ㄹ")
        .replace(/m/g, "ㅁ")
        .replace(/n/g, "ㄴ")
        .replace(/p/g, "ㅍ")
        .replace(/s/g, "ㅅ")
        .replace(/t/g, "ㅌ")
        .replace(/f/g, "ㅍ");
}

let historyList = [];
let screenFontSize = 48;
const screenFontMin = 28;
const screenFontMax = 120;
let loadingInterval = null;
let toastTimeout = null;

function applyScreenTextSize() {
    document.getElementById("screenText").style.fontSize = screenFontSize + "px";
}

function resetScreenStyle() {
    screenFontSize = window.innerWidth <= 768 ? 34 : 48;
    document.getElementById("screenContent").style.transform = "rotate(0deg)";
    document.getElementById("screenMode").classList.remove("inverted");
    applyScreenTextSize();
}

function increaseScreenText() {
    screenFontSize = Math.min(screenFontSize + 6, screenFontMax);
    applyScreenTextSize();
}

function decreaseScreenText() {
    screenFontSize = Math.max(screenFontSize - 6, screenFontMin);
    applyScreenTextSize();
}

function setVertical() {
    document.getElementById("screenContent").style.transform = "rotate(0deg)";
    screenFontSize = window.innerWidth <= 768 ? 34 : 48;
    applyScreenTextSize();
}

function setHorizontal() {
    document.getElementById("screenContent").style.transform = "rotate(90deg)";
    screenFontSize = window.innerWidth <= 768 ? 44 : 64;
    applyScreenTextSize();
}

function toggleInvert() {
    document.getElementById("screenMode").classList.toggle("inverted");
}

function openScreen(mongolianText) {
    document.getElementById("screenText").innerText = mongolianText;
    resetScreenStyle();
    document.getElementById("screenMode").style.display = "flex";
}

function closeScreen() {
    document.getElementById("screenMode").style.display = "none";
}

function showToast() {
    const toast = document.getElementById("toast");
    clearTimeout(toastTimeout);
    toast.style.opacity = "1";
    toastTimeout = setTimeout(() => {
        toast.style.opacity = "0";
    }, 1200);
}

function startLoadingMessage() {
    const loadingText = document.getElementById("loadingText");
    const button = document.getElementById("translateBtn");
    let dots = 1;

    button.disabled = true;
    loadingText.textContent = "기다려 주세요" + ".".repeat(dots);

    loadingInterval = setInterval(() => {
        dots = dots >= 3 ? 1 : dots + 1;
        loadingText.textContent = "기다려 주세요" + ".".repeat(dots);
    }, 300);
}

function stopLoadingMessage() {
    const loadingText = document.getElementById("loadingText");
    const button = document.getElementById("translateBtn");

    clearInterval(loadingInterval);
    loadingInterval = null;
    loadingText.textContent = "";
    button.disabled = false;
}

async function run() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    startLoadingMessage();

    try {
        const resMn = await fetch(
            "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=mn&dt=t&q=" +
            encodeURIComponent(input)
        );
        const dataMn = await resMn.json();
        const mn = dataMn[0][0][0];

        const resEn = await fetch(
            "https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=en&dt=t&q=" +
            encodeURIComponent(input)
        );
        const dataEn = await resEn.json();
        const en = dataEn[0][0][0];

        const roman = toRoman(mn);
        const kor = romanToKorean(roman);
        const glossaryMatches = findGlossaryMatches(input);

        const glossaryHtml = glossaryMatches.length
            ? `
                <div class="glossary-wrap">
                    ${glossaryMatches.map(item => `<div class="glossary-line">✝️: ${item.pronunciation}</div>`).join("")}
                </div>
            `
            : "";

        const highlightedInputHtml = glossaryMatches.length
            ? `<div class="highlighted-input">${highlightMatchedOrigins(input, glossaryMatches)}</div>`
            : `<div class="highlighted-input">${input}</div>`;

        document.getElementById("result").innerHTML = `
            <div class="result-card">
                ${highlightedInputHtml}
                <div class="result-main">${mn} / ${roman} / ${kor}</div>
                <div class="result-english">ENGLISH: ${en}</div>
                ${glossaryHtml}
            </div>
        `;

        historyList.unshift({
            input,
            mn,
            roman,
            kor,
            glossaryMatches
        });

        if (historyList.length > 12) historyList.pop();

        renderHistory();
    } catch (error) {
        document.getElementById("result").innerHTML = `
            <div class="result-card">
                <div class="result-main">번역 중 오류가 발생했습니다.</div>
            </div>
        `;
        console.error(error);
    } finally {
        stopLoadingMessage();
    }
}

function renderHistory() {
    const box = document.getElementById("history");
    box.innerHTML = "";

    historyList.forEach(item => {
        const glossaryHtml = item.glossaryMatches.length
            ? `
                <div class="glossary-wrap">
                    ${item.glossaryMatches.map(match => `<div class="glossary-line">✝️: ${match.pronunciation}</div>`).join("")}
                </div>
            `
            : "";

        const div = document.createElement("div");
        div.className = "item";

        const content = document.createElement("div");
        content.className = "item-content";
        content.innerHTML = `
            <div class="history-card">
                <div class="history-main">${item.input} / ${item.mn} / ${item.roman} / ${item.kor}</div>
                ${glossaryHtml}
            </div>
        `;

        const btnBox = document.createElement("div");
        btnBox.className = "buttons";

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerText = "복사";
        copyBtn.onclick = () => {
            const glossaryText = item.glossaryMatches.map(match => `✝️: ${match.pronunciation}`).join("\n");
            const copyText = [
                item.input,
                item.mn,
                item.roman,
                item.kor,
                glossaryText
            ].filter(Boolean).join("\n");

            navigator.clipboard.writeText(copyText);
            showToast();
        };

        const screenBtn = document.createElement("button");
        screenBtn.className = "screen-btn";
        screenBtn.innerText = "스크린";
        screenBtn.onclick = () => openScreen(item.mn);

        btnBox.appendChild(copyBtn);
        btnBox.appendChild(screenBtn);

        div.appendChild(content);
        div.appendChild(btnBox);
        box.appendChild(div);
    });
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") run();
});
</script>
